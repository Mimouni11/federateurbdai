services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8765:8765"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./deepfake_detector/model.pt:/app/deepfake_detector/model.pt:ro
      - ./checkpoints:/app/checkpoints:ro
      - ./mlflow.db:/app/mlflow.db
      - ./mlruns:/app/mlruns
      - ./mlartifacts:/app/mlartifacts
    gpus: all

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "3000:80"
    depends_on:
      - api

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5555:5555"
    volumes:
      - ./mlflow.db:/mlflow/mlflow.db
      - ./mlruns:/mlflow/mlruns
      - ./mlartifacts:/mlflow/mlartifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5555
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root file:///mlflow/mlartifacts
